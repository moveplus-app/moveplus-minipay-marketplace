<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Move+ Marketplace · MiniPay Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">M+</div>
        <div>
          <h1>Move+ Marketplace</h1>
          <p class="subtitle">Philippines delivery only</p>
        </div>
      </div>
    </header>

    <main id="app-root">
      <section class="card loading">
        <p>Loading checkout…</p>
      </section>
    </main>

    <footer class="footer">
      <p>Off-chain product · On-chain payment verification</p>
      <p class="muted">Energy Points are separate from crypto checkout.</p>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
