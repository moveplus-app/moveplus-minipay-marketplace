<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#242424" />
    <meta
      name="description"
      content="Move+ Web Marketplace — real goods catalog, Philippines delivery."
    />
    <title>Move+ Marketplace</title>
    <link rel="stylesheet" href="styles.css?v=20260708-gear-1" />
    <script src="config.js?v=20260708-gear-1"></script>
  </head>
  <body>
    <div id="app" class="app" aria-live="polite">
      <header class="marketplace-header safe-top">
        <div class="header-left">
          <button type="button" id="btn-menu" class="icon-button" aria-label="Menu" aria-expanded="false">
            <span class="hamburger-bars" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>
          <h1 class="header-title">Marketplace</h1>
        </div>
        <div class="header-actions">
          <button type="button" id="btn-search" class="icon-button" aria-label="Search products">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7.5" stroke="currentColor" stroke-width="1.6" />
              <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </button>
          <button type="button" id="btn-filter" class="icon-button" aria-label="Filter products">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 7h6M15 7h6M9 7a3 3 0 106 0 3 3 0 00-6 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              <path d="M3 17h8M19 17h2M11 17a3 3 0 106 0 3 3 0 00-6 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </button>
          <button type="button" id="btn-cart" class="icon-button icon-button-cart" aria-label="Cart">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.6" />
              <path d="M9 12h6M9 16h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span id="cart-badge" class="cart-badge hidden" aria-hidden="true">0</span>
          </button>
        </div>
      </header>

      <div id="search-bar" class="search-bar hidden" role="search">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search products"
          autocomplete="off"
          enterkeyhint="search"
        />
        <button type="button" id="btn-search-clear" class="icon-button search-clear-btn" aria-label="Clear search">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <main id="main" class="main"></main>

      <footer class="footer safe-bottom">
        <p>Move+ Web Marketplace · Same catalog as the Move+ app</p>
      </footer>
    </div>

    <div id="ui-overlay" class="ui-overlay hidden" aria-hidden="true"></div>
    <nav id="menu-drawer" class="menu-drawer hidden" aria-label="Marketplace menu" aria-hidden="true"></nav>
    <div id="filter-sheet" class="filter-sheet hidden" role="dialog" aria-modal="true" aria-labelledby="filter-sheet-title" aria-hidden="true"></div>
    <div id="mp-modal" class="mp-modal hidden" role="dialog" aria-modal="true" aria-hidden="true"></div>
    <div id="mp-toast" class="mp-toast hidden" role="status" aria-live="polite"></div>

    <script src="digital-gear-preview.js?v=20260708-cusd-1"></script>
    <script src="app.js?v=20260708-gear-1" defer></script>
  </body>
</html>
